{% extends "layout.html" %}
{% load crispy_forms_tags %}

{% block content %}
<style>
    /* Dark Mode Form Styling */
    label {
        color: #ced4da !important;
        font-size: 0.9rem;
        margin-bottom: 5px;
    }
    .form-control {
        background-color: #252525 !important;
        border: 1px solid #444 !important;
        color: #fff !important;
        padding: 0.75rem;
    }
    .form-control:focus {
        border-color: #0d6efd !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15) !important;
    }
    .form-text {
        color: #6c757d !important;
    }
</style>



<div class="container mt-5" id="register-container" style="opacity: 0;">
    <div class="row justify-content-center">
        <div class="col-md-5 p-4 shadow-lg rounded-4 text-white" 
             style="background: #1a1a1a; border: 1px solid #333;">
            
            <h2 class="mb-4 text-center fw-bold">Create Account</h2>
            
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }} 
                
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow">
                        Register
                    </button>
                </div>
            </form>
            
            <div class="mt-4 text-center">
                <small class="text-secondary">
                    Already have an account? 
                    <a href="{% url 'login' %}" class="text-info text-decoration-none">Login here</a>
                </small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Animates the container: Starts 50px lower and invisible, then slides up and fades in
        gsap.to("#register-container", {
            duration: 1.2,
            y: 0,
            opacity: 1,
            ease: "power4.out",
            delay: 0.2
        });
    });
</script>


{% endblock %}
