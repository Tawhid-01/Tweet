{% load static %}
<!doctype html>
<html data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>{% block title %} Tweet {% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" 
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" 
      crossorigin="anonymous">
    <style>
      /* Modern styling for Django's default form outputs */
      form input,
      form select,
      form textarea {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #dee2e6;
        background-color: #212529;
        border: 1px solid #495057;
        border-radius: 0.375rem;
        margin-bottom: 1rem;
      }
      /* Styling the Logout button to look like a Nav link */
      .nav-logout-btn {
        background: transparent;
        color: var(--text-main); /* Using your variable #e7e9ea */
        border: 1px solid var(--border-gray); /* Using #2f3336 */
        padding: 6px 20px;
        font-weight: 600;
        border-radius: 9999px; /* Pill shape */
        font-size: 0.9rem;
        transition: all 0.2s ease;
        cursor: pointer;
      }

      .nav-logout-btn:hover {
        background-color: rgba(244, 33, 46, 0.1); /* Subtle red tint */
        color: var(--accent-red); /* Using #f4212e */
        border-color: var(--accent-red);
      }

      .nav-logout-btn i {
        font-size: 1.1rem;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Tweetbar</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav w-100 align-items-lg-center">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>

            {% if user.is_authenticated %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'tweet_list' %}">
                <i class="bi bi-chat-left-text"></i> All Tweets
              </a>
            </li>

            <li class="nav-item">
              <a
                class="btn btn-primary btn-sm ms-lg-2 my-2 my-lg-0"
                href="{% url 'tweet_create' %}"
              >
                <i class="bi bi-plus-lg"></i> Post a Tweet
              </a>
            </li>

            <li class="nav-item ms-lg-auto">
              <span class="nav-link text-info">
                <i class="bi bi-person-circle"></i> {{ user.username }}
              </span>
            </li>
            <li class="nav-item">
              <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="nav-logout-btn">
                  <i class="bi bi-box-arrow-right me-2"></i>Logout
                </button>
              </form>
            </li>

            {% else %}
            <li class="nav-item ms-lg-auto">
              <a
                class="btn btn-outline-primary btn-sm px-4 my-2 my-lg-0"
                href="{% url 'login' %}"
              >
                Login
              </a>
            </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">{% block content %} {% endblock %}</div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
