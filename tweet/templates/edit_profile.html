{% extends "layout.html" %}

{% block title %} Edit Profile {% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark border-secondary shadow-lg p-4">
                <h2 class="mb-4 fw-bold text-white border-bottom border-secondary pb-3">Update Profile</h2>
                
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label text-secondary small uppercase fw-bold">Profile Picture</label>
                        <div class="bg-body-tertiary p-3 rounded-3 border border-secondary mb-2">
                            <p class="text-muted small mb-2">Currently: <span class="text-info">{{ user.profile.profile_image.name }}</span></p>
                            <input type="file" name="profile_image" class="form-control bg-dark text-white border-secondary" id="id_profile_image">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="id_bio" class="form-label text-secondary small uppercase fw-bold">Bio</label>
                        <textarea name="bio" id="id_bio" class="form-control bg-dark text-white border-secondary" rows="4" placeholder="Tell the world who you are...">{{ user.profile.bio }}</textarea>
                    </div>

                    <div class="mb-4">
                        <label for="id_location" class="form-label text-secondary small uppercase fw-bold">Location</label>
                        <input type="text" name="location" id="id_location" class="form-control bg-dark text-white border-secondary" value="{{ user.profile.location }}" placeholder="e.g. Croatia">
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary rounded-pill fw-bold" type="submit">
                            <i class="bi bi-check2-circle me-2"></i>Save Changes
                        </button>
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary rounded-pill">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
