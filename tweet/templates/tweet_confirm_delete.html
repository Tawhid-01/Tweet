{% extends "layout.html" %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<style>
    :root {
        --bg-black: #000000;
        --border-gray: #2f3336;
        --text-main: #e7e9ea;
        --text-muted: #71767b;
        --accent-red: #f4212e;
    }

    /* 1. Remove flex from body to fix the Navbar */
    body {
        background-color: var(--bg-black);
        color: var(--text-main);
        margin: 0;
    }

    /* 2. Create a centered wrapper for the card ONLY */
    .delete-page-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 70px); /* Subtracts roughly navbar height */
        width: 100%;
    }

    .delete-card {
        background-color: var(--bg-black);
        border: 1px solid var(--border-gray);
        border-radius: 16px;
        padding: 32px;
        max-width: 400px;
        width: 90%;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .warning-icon {
        font-size: 3rem;
        color: var(--accent-red);
        margin-bottom: 16px;
    }

    h1 {
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 12px;
    }

    p {
        color: var(--text-muted);
        margin-bottom: 30px;
        line-height: 1.5;
    }

   /* Flexbox Row Layout */
    .btn-action-row {
        display: flex;
        justify-content: space-between; /* Pushes buttons to opposite sides */
        align-items: center;
        gap: 16px;
        margin-top: 20px;
    }

    /* Base Button Styling */
    .btn-delete, .btn-cancel {
        flex: 1; /* Makes both buttons equal width */
        padding: 10px 20px;
        border-radius: 9999px;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
        text-align: center;
    }

    /* Delete Button Hover: Glow & Scale */
    .btn-delete {
        background-color: var(--accent-red);
        color: white;
        border: 1px solid var(--accent-red);
    }

    .btn-delete:hover {
        background-color: #d81c27;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(244, 33, 46, 0.4);
    }

    .btn-delete:active {
        transform: translateY(0);
    }

    /* Cancel Button Hover: Ghost Highlight */
    .btn-cancel {
        background-color: transparent;
        color: var(--text-main);
        border: 1px solid var(--border-gray);
    }

    .btn-cancel:hover {
        background-color: rgba(255, 255, 255, 0.1);
        border-color: var(--text-muted);
        transform: translateY(-2px);
    }

    .btn-cancel:active {
        transform: translateY(0);
    }
    /* Define the Shake Animation */
    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-3px) rotate(-1deg); }
        50% { transform: translateX(3px) rotate(1deg); }
        75% { transform: translateX(-3px) rotate(-1deg); }
        100% { transform: translateX(0); }
    }

    /* Apply shake on hover with a slight delay */
    .btn-delete:hover {
        background-color: #d81c27;
        box-shadow: 0 4px 15px rgba(244, 33, 46, 0.4);
        /* The shake starts after 0.2s of hovering */
        animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) 0.2s infinite;
    }

    /* Cancel button should still just lift slightly */
    .btn-cancel:hover {
        background-color: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
    }
</style>

<div class="delete-page-wrapper">
    <div class="delete-card">
        <div class="warning-icon">
            <i class="bi bi-exclamation-octagon"></i>
        </div>

        <h1>Delete Tweet?</h1>
        <p>This can’t be undone and it will be removed from your profile and the timeline.</p>

        <form method="POST" class="btn-action-row">
            {% csrf_token %}
            <button type="submit" class="btn-delete">Delete</button>
            <a href="{% url 'tweet_list' %}" class="btn-cancel">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
